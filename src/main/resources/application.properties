spring.application.name=Projekt-Arbete-Webserver
spring.docker.compose.enabled=false
gg.jte.developmentMode=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true

# Database Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/snippet_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dev_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dev_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Server Port (Render uses PORT env var)
server.port=${PORT:8080}

# JPA / Hibernate
# Disable automatic schema generation (Flyway will handle it)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.placeholder-replacement=false

# SPA Routing
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# JWT Configuration
app.jwt.secret=${JWT_SECRET:======================SnippetLibrarySecretKeyByMats=========================}
app.jwt.expiration-ms=86400000

# Logging levels
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE