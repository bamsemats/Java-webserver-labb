services:
  postgres:
    image: postgres:15-alpine
    container_name: snippet-db
    environment:
      POSTGRES_DB: snippet_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  snippet-app:
    build: .
    container_name: snippet-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/snippet_db
      - SPRING_DATASOURCE_USERNAME=dev_user
      - SPRING_DATASOURCE_PASSWORD=dev_password
    depends_on:
      - postgres

volumes:
  postgres_data:
